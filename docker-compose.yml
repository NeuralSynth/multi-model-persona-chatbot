services:
  sst-chatbot:
    build:
      context: .
      target: runtime          # use the final stage, not builder
    image: sst-chatbot:latest
    container_name: sst-chatbot
    ports:
      - "8501:8501"
    env_file:
      - C:\Users\laksh\AppData\Roaming\JetBrains\PyCharm2026.1\scratches\scratch_1.env                 # mount provider credentials at runtime, never bake them in
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # Configure one or more providers in .env:
      # OPENAI_API_KEY, GEMINI_API_KEY, DEEPSEEK_API_KEY
      # SELF_HOSTED_BASE_URL, SELF_HOSTED_MODEL_NAME, SELF_HOSTED_API_KEY
      # Chat history is maintained separately for each persona/model pair in app state.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # optional: uncomment to add a local reverse proxy (nginx) in front
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - sst-chatbot
